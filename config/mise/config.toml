# Global mise config (~/.config/mise/config.toml when dotfiles are linked).
# Tools mirror Brewfile; per-machine overrides: config/mise/config.local.toml (gitignored).
#
# Brewfile → mise mapping (Linux/WSL; Brew is legacy/optional via ./install homebrew):
#   brew bat       → bat
#   brew fd        → fd
#   brew fzf       → fzf (run fzf install for keybindings if desired)
#   brew lsd       → lsd
#   brew hub       → hub (commented out; uncomment if needed)
#   brew jq        → jq
#   brew neovim    → neovim
#   brew uv        → uv
#   brew ripgrep   → ripgrep
#   brew tmux      → tmux
#   brew zoxide    → zoxide
#   brew starship  → starship

[tools]
bat = "latest"
fd = "latest"
fzf = "latest"
jq = "latest"
lsd = "latest"
neovim = "latest"
ripgrep = "latest"
starship = "latest"
tmux = "latest"
uv = "latest"
zoxide = "latest"
hub = "latest"  # optional; uncomment if you use gh/hub (Brewfile had it)
