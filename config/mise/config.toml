# Global mise config (~/.config/mise/config.toml when dotfiles are linked).
# Per-machine overrides: config/mise/config.local.toml (gitignored).
#
# Available tools:
#   bat       - cat clone with syntax highlighting
#   fd        - simple, fast file finder
#   fzf       - command-line fuzzy finder (run fzf install for keybindings if desired)
#   lsd       - ls alternative with icons
#   hub       - GitHub CLI helper (optional; uncomment if needed)
#   jq        - JSON processor
#   neovim    - modern vim
#   uv        - fast Python package installer
#   ripgrep   - fast text search
#   tmux      - terminal multiplexer
#   zoxide    - smarter cd command
#   starship  - cross-shell prompt

[tools]
bat = "latest"
fd = "latest"
fzf = "latest"
jq = "latest"
lsd = "latest"
neovim = "latest"
ripgrep = "latest"
starship = "latest"
tmux = "latest"
uv = "latest"
zoxide = "latest"
hub = "latest"  # optional; uncomment if you use gh/hub
